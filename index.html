<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нуркыз - Robotics Portfolio</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --dark: #0f0c29;
            --text: #ffffff;
            --accent: #00d2ff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #1e1b4b, #0f0c29);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header { text-align: center; margin-bottom: 60px; }
        h1 { font-size: clamp(2rem, 8vw, 3.5rem); margin: 10px 0; background: linear-gradient(to right, #fff, var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; letter-spacing: 4px; }
        .badge { background: var(--primary); padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; width: 100%; max-width: 1200px; }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 20px; transition: 0.4s ease; backdrop-filter: blur(12px); overflow: hidden; }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }

        video, .preview-img { width: 100%; height: 220px; object-fit: cover; border-radius: 16px; background: #000; margin-bottom: 20px; }

        .ai-card { border: 1px solid var(--primary); background: rgba(108, 92, 231, 0.1); }
        .btn { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; margin-bottom: 10px; text-transform: uppercase; }
        .btn-upload { background: var(--primary); color: white; }
        .btn-detect { background: var(--accent); color: var(--dark); }
        #resultText { margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.4); border-radius: 8px; color: var(--accent); font-family: monospace; font-size: 0.9rem; }
        
        input[type="file"] { display: none; }
        .contacts { margin-top: 60px; text-align: center; opacity: 0.7; }
        .contacts a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>

    <header>
        <span class="badge">Рахматилдаева Нуркыз • 8 Класс</span>
        <h1>Robotics Lab</h1>
        <p>Scratch проекты и ИИ Покедекс</p>
    </header>

    <div class="grid">
        <div class="card ai-card">
            <img id="preview" class="preview-img" src="https://placehold.co/400x300/1e1b4b/ffffff?text=Загрузи+фото" alt="AI Preview">
            <label for="imageInput" class="btn btn-upload">Выбрать фото</label>
            <input type="file" id="imageInput" accept="image/*" onchange="handlePreview(event)">
            <button class="btn btn-detect" onclick="runInference()">Запустить AI</button>
            <div id="resultText">Система готова...</div>
        </div>

        <div class="card">
            <video muted loop preload="none" onmouseenter="safePlay(this)" onmouseleave="safePause(this)" src="scratch.mp4"></video>
            <h3>Main Bot System</h3>
        </div>
        <div class="card"><video muted loop preload="none" onmouseenter="safePlay(this)" onmouseleave="safePause(this)" src="scratch%2015.webm"></video><h3>Version 1.5.0</h3></div>
        <div class="card"><video muted loop preload="none" onmouseenter="safePlay(this)" onmouseleave="safePause(this)" src="ml4k-recording%20(7).webm"></video><h3>ML4K Data</h3></div>
        <div class="card"><video muted loop preload="none" onmouseenter="safePlay(this)" onmouseleave="safePause(this)" src="scratch%200.1.webm"></video><h3>Module 0.1</h3></div>
        <div class="card"><video muted loop preload="none" onmouseenter="safePlay(this)" onmouseleave="safePause(this)" src="scratch%200.2.webm"></video><h3>Module 0.2</h3></div>
        <div class="card"><video muted loop preload="none" onmouseenter="safePlay(this)" onmouseleave="safePause(this)" src="scratch%200.3.webm"></video><h3>Module 0.3</h3></div>
        <div class="card"><video muted loop preload="none" onmouseenter="safePlay(this)" onmouseleave="safePause(this)" src="scratch%200.5.webm"></video><h3>Module 0.5</h3></div>
        <div class="card"><video muted loop preload="none" onmouseenter="safePlay(this)" onmouseleave="safePause(this)" src="Scratch%200.6.webm"></video><h3>Module 0.6</h3></div>
        <div class="card"><video muted loop preload="none" onmouseenter="safePlay(this)" onmouseleave="safePause(this)" src="scratch%2008.webm"></video><h3>Module 0.8</h3></div>
        <div class="card"><video muted loop preload="none" onmouseenter="safePlay(this)" onmouseleave="safePause(this)" src="scratch%2009.webm"></video><h3>Module 0.9</h3></div>
        <div class="card"><video muted loop preload="none" onmouseenter="safePlay(this)" onmouseleave="safePause(this)" src="scratch%2009%20(2).webm"></video><h3>Module 0.9.B</h3></div>
        <div class="card"><video muted loop preload="none" onmouseenter="safePlay(this)" onmouseleave="safePause(this)" src="scratch0%200.webm"></video><h3>Core 0.0</h3></div>
    </div>

    <div class="contacts">
        <p>Telegram: <a href="https://t.me/nurka" target="_blank">@nurka</a> • 2024</p>
    </div>

    <script>
        const HF_KEY = "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"; 
        const MODEL = "https://api-inference.huggingface.co/models/keremberke/yolov8n-pokemon-classification";
        const PROXY = "https://corsproxy.io/?";

        function handlePreview(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('preview').src = URL.createObjectURL(file);
                document.getElementById('resultText').innerText = "Фото готово";
            }
        }

        async function runInference() {
            const input = document.getElementById('imageInput');
            const log = document.getElementById('resultText');
            if (!input.files[0]) return alert("Выбери фото!");

            log.innerText = ">> Анализ через прокси...";
            
            try {
                // Используем прокси для обхода CORS
                const response = await fetch(PROXY + encodeURIComponent(MODEL), {
                    method: "POST",
                    headers: { "Authorization": "Bearer " + HF_KEY },
                    body: input.files[0]
                });

                const data = await response.json();

                if (data.error) {
                    log.innerText = "Модель загружается... Попробуй через 20 сек.";
                } else if (data[0]) {
                    log.innerText = `RESULT: ${data[0].label.toUpperCase()} (${Math.round(data[0].score * 100)}%)`;
                }
            } catch (err) {
                log.innerText = "Ошибка CORS/Сети. Попробуй позже.";
                console.error(err);
            }
        }

        // Функции для безопасного управления видео
        function safePlay(video) {
            const playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {}).catch(error => {
                    console.log("Play interrupted");
                });
            }
        }

        function safePause(video) {
            video.pause();
        }
    </script>
</body>
</html>
